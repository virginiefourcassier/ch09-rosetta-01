<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trajectoire Rosetta — contraste renforcé</title>

<style>
html,body{height:100%;margin:0}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111827;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

.stage{
  width:550px;
  height:400px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 14px 30px rgba(0,0,0,.45);
  background:#000;
}

/* 🔎 Correction : contraste augmenté, luminosité inchangée */
.stage ruffle-player,
.stage canvas{
  width:550px !important;
  height:400px !important;
  filter: brightness(1.00) contrast(1.85) saturate(1.10);
}
</style>

<script>
/* Forcer rendu canvas pour meilleure compatibilité ÉLÉA */
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
  autoplay: "on",
  unmuteOverlay: "hidden",
  letterbox: "off",
  backgroundColor: "#000000",
  renderer: "canvas"
};
</script>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body>

<div class="stage" id="stage"></div>

<script>
(function(){
  const ruffle = window.RufflePlayer?.newest?.();
  const stage = document.getElementById("stage");

  if(!ruffle){
    stage.innerHTML = "<div style='color:white;padding:20px'>Ruffle indisponible.</div>";
    return;
  }

  const player = ruffle.createPlayer();
  player.style.width = "550px";
  player.style.height = "400px";
  stage.appendChild(player);

  player.load({ url: "rosetta.swf" });
})();
</script>

</body>
</html>
