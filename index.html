<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trajectoire de la sonde Rosetta (lisibilité renforcée)</title>

<style>
  html,body{height:100%;margin:0}
  body{
    display:flex;align-items:center;justify-content:center;
    background:#111827; /* fond sombre neutre */
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }
  .wrap{padding:16px;box-sizing:border-box;width:100%;max-width:980px}
  .stage{
    width:550px;height:400px;margin:0 auto;
    border-radius:12px; overflow:hidden;
    box-shadow:0 14px 30px rgba(0,0,0,.45);
    background:#000; /* évite "halo gris" */
    position:relative;
  }

  /* ✅ Amélioration visibilité : luminosité/contraste/saturation */
  .stage ruffle-player,
  .stage canvas{
    width:550px !important;
    height:400px !important;

    /* Réglage recommandé (modifiable) */
    filter: brightness(1.25) contrast(1.35) saturate(1.15);
  }

  .note{
    max-width:550px;margin:10px auto 0;
    color:#e5e7eb;font-size:12px;opacity:.85;line-height:1.35
  }
  .note code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:6px}
</style>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body>
  <div class="wrap">
    <div class="stage" id="stage"></div>
    <div class="note">
      Si vous voulez renforcer davantage : augmentez <code>brightness()</code> ou <code>contrast()</code> dans <code>index.html</code>.
      Dans ÉLÉA, gardez un iframe avec <code>sandbox</code> si l’animation apparaît blanche.
    </div>
  </div>

<script>
(function(){
  const ruffle = window.RufflePlayer?.newest();
  const stage = document.getElementById("stage");

  if(!ruffle){
    stage.innerHTML = "<div style='color:white;padding:20px'>Ruffle indisponible.</div>";
    return;
  }

  const player = ruffle.createPlayer();
  player.style.width = "550px";
  player.style.height = "400px";
  stage.appendChild(player);

  player.load({ url: "rosetta.swf" });
})();
</script>
</body>
</html>
